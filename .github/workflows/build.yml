name: Build

on: push

jobs:
  build:
    name: ImageDup build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          cache: true
          go-version: "1.25"

      - name: Prepare
        run: |
          go clean -r ./...
          go mod tidy

      - name: Test
        run: |
          go test -v -race -count 1 -parallel 50 -covermode=atomic -coverprofile="coverage.out" -coverpkg=./internal/...,./pkg/... ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true # optional (default = false)

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Build 
        run: |
          go build -v -ldflags="-s -w" ./...

      - name: Govulncheck
        uses: kmulvey/govulncheck-action@v1.5.0
